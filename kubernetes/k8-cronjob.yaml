apiVersion: batch/v1
kind: CronJob
metadata:
  name: reciterdb
  namespace: reciter
  labels:
    app: reciterdb
    tier: backend
    owner: szd2013
spec:
  # Matches the live prod object so `kubectl apply` is a no-op. Do NOT change the
  # schedule here without changing it live — this is the sole source of truth.
  schedule: "15 4 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: reciterdb
            # Substituted at build time by the ReCiterDB pipeline (set-image); a raw
            # apply of this file would set the literal string CONTAINER_IMAGE — build
            # first, or patch the image separately.
            image: CONTAINER_IMAGE
            env:
            # AAR Scopus + PubMed lanes (weekly, gated in run_all.py)
            - name: SCOPUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: scopus-secret
                  key: SCOPUS_API_KEY
            - name: SCOPUS_INST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: scopus-secret
                  key: SCOPUS_INST_TOKEN
            - name: PUBMED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pubmed-secret
                  key: PUBMED_API_KEY
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: reciterdb-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reciterdb-secrets
                  key: DB_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: reciterdb-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: reciterdb-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: URL
              valueFrom:
                secretKeyRef:
                  name: reciterdb-secrets
                  key: URL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: reciterdb-secrets
                  key: API_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: reciterdb-configmap
                  key: AWS_DEFAULT_REGION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: reciterdb-configmap
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: reciterdb-configmap
                  key: DB_NAME
            - name: LOG_FILE
              valueFrom:
                configMapKeyRef:
                  name: reciterdb-configmap
                  key: LOG_FILE
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: reciterdb-configmap
                  key: S3_BUCKET
            - name: S3_KEY_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: reciterdb-configmap
                  key: S3_KEY_PREFIX
          restartPolicy: OnFailure
